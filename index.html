<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AeroDesk — Airline Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Palette
         #003049  deep navy     → header, bot avatar, dark text
         #D62828  vivid red     → primary accent, send btn, user bubble
         #F77F00  orange        → hover states, secondary highlights
         #FCBF49  golden yellow → shimmer line, flight card accents, badges
         #EAE2B7  warm cream    → page bg, bot bubble bg
    ────────────────────────────────────────────────── */
    :root {
      --navy:         #003049;
      --navy-deep:    #001e30;
      --red:          #D62828;
      --red-dark:     #b01f1f;
      --orange:       #F77F00;
      --gold:         #FCBF49;
      --gold-dim:     #e6aa30;
      --cream:        #EAE2B7;
      --cream-dim:    #ddd5a8;
      --cream-light:  #f5f1e0;

      --bg:           #efddcc;
      --surface:      #ffffff;
      --border:       #ddd5b0;
      --border-light: #ece7cc;
      --text:         #1a1208;        /* near-black warm tone */
      --muted:        #6b5e3e;        /* warm brown-grey */
      --bubble-user:  var(--red);
      --bubble-bot:   #ffffff;

      --radius:       14px;
      --font-ui:      'Sora', sans-serif;
      --font-mono:    'DM Mono', monospace;
      --shadow-sm:    0 1px 4px rgba(0,48,73,.08);
      --shadow-md:    0 4px 20px rgba(0,48,73,.13);
      --shadow-lg:    0 12px 40px rgba(0,48,73,.16);
    }

    html, body {
      height: 100%;
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── App shell ─────────────────────────────────── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 840px;
      margin: 0 auto;
      /* Subtle left/right shadow to lift it off the bg */
      box-shadow: 0 0 60px rgba(0,48,73,.10);
    }

    /* ════════════════════════════════════════════════
       HEADER
    ════════════════════════════════════════════════ */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 24px;
      background: linear-gradient(135deg, var(--navy-deep) 0%, var(--navy) 100%);
      color: #fff;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    /* Decorative circle top-right */
    header::before {
      content: '';
      position: absolute;
      right: -50px; top: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(252,191,73,.06);
      pointer-events: none;
    }
    /* Gold shimmer line at bottom */
    header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2.5px;
      background: linear-gradient(90deg, transparent 0%, var(--gold) 40%, var(--orange) 60%, transparent 100%);
    }

    .header-logo {
      width: 44px; height: 44px;
      background: rgba(252,191,73,.15);
      border: 1.5px solid rgba(252,191,73,.3);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-logo svg { width: 26px; height: 26px; fill: var(--gold); }

    .header-text h1 {
      font-size: 17px; font-weight: 700;
      letter-spacing: -.3px; color: #fff;
    }
    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,.45);
      margin-top: 1px;
      font-family: var(--font-mono);
      letter-spacing: .02em;
    }

    .status-pill {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      color: rgba(255,255,255,.65);
      font-family: var(--font-mono);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 5px rgba(74,222,128,.7);
      animation: blink 2.2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .35; }
    }

    /* ════════════════════════════════════════════════
       QUICK BAR
    ════════════════════════════════════════════════ */
    .quick-bar {
      display: flex; gap: 7px;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1.5px solid var(--border-light);
      overflow-x: auto; flex-shrink: 0;
    }
    .quick-bar::-webkit-scrollbar { display: none; }

    .quick-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 13px;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      background: var(--cream-light);
      color: var(--muted);
      font-family: var(--font-ui);
      font-size: 12px; font-weight: 500;
      cursor: pointer; white-space: nowrap;
      transition: all .17s ease;
    }
    .quick-btn svg {
      width: 14px; height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
    /* Help btn uses fill not stroke */
    .quick-btn.btn-help svg {
      fill: currentColor; stroke: none;
    }
    .quick-btn:hover {
      background: var(--navy);
      border-color: var(--navy);
      color: #fff;
    }
    .quick-btn:hover svg { stroke: #fff; }
    .quick-btn.btn-help:hover svg { fill: #fff; stroke: none; }

    /* ════════════════════════════════════════════════
       MESSAGES AREA
    ════════════════════════════════════════════════ */
    #messages {
      flex: 1; overflow-y: auto;
      padding: 24px 22px;
      display: flex; flex-direction: column; gap: 20px;
      scroll-behavior: smooth;
      background: var(--bg);
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--cream-dim); border-radius: 4px; }

    /* ── Message row ──────────────────────────────── */
    .msg-row {
      display: flex; gap: 10px;
      animation: slideUp .22s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.user { flex-direction: row-reverse; }

    /* ── Avatars ──────────────────────────────────── */
    .avatar {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }
    .avatar.bot {
      background: linear-gradient(145deg, var(--navy-deep), var(--navy));
      box-shadow: 0 2px 8px rgba(0,48,73,.28);
    }
    .avatar.user {
      background: linear-gradient(145deg, var(--red-dark), var(--red));
      box-shadow: 0 2px 8px rgba(214,40,40,.28);
    }
    .avatar svg { width: 18px; height: 18px; fill: #fff; }

    /* ── Bubbles ──────────────────────────────────── */
    .bubble {
      max-width: 68%;
      min-width: 90px;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.65; font-size: 14px;
      box-shadow: var(--shadow-sm);
      word-break: break-word;
    }
    .msg-row.bot .bubble {
      background: var(--bubble-bot);
      border: 1.5px solid var(--border-light);
      border-top-left-radius: 4px;
      color: var(--text);
    }
    .msg-row.user .bubble {
      background: var(--bubble-user);
      border-top-right-radius: 4px;
      color: #fff;
    }

    .bubble-meta {
      font-size: 10.5px; color: var(--muted);
      margin-top: 5px; font-family: var(--font-mono);
      opacity: .7;
    }
    .msg-row.user .bubble-meta { text-align: right; }

    /* ── Intent badges ────────────────────────────── */
    .intent-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 999px;
      font-size: 10.5px; font-weight: 600;
      font-family: var(--font-mono);
      margin-bottom: 9px;
      letter-spacing: .02em;
    }
    /* Each badge tinted from the palette */
    .intent-badge.search  { background: #e8f0f5; color: var(--navy);   border: 1px solid #b0ccd9; }
    .intent-badge.booking { background: #eaf5e8; color: #1a5c18;       border: 1px solid #a8d9a4; }
    .intent-badge.cancel  { background: #fdecea; color: var(--red);    border: 1px solid #f5b8b4; }
    .intent-badge.seat    { background: #fff5e0; color: #7a4a00;       border: 1px solid var(--gold); }
    .intent-badge.ticket  { background: #fff0e0; color: #7a3800;       border: 1px solid var(--orange); }
    .intent-badge.help    { background: #f0f0f0; color: #444;          border: 1px solid #ccc; }
    .intent-badge.unknown { background: #fdecea; color: #991b1b;       border: 1px solid #f5b8b4; }

    .bubble-body strong { font-weight: 600; }

    /* ── Flight cards ─────────────────────────────── */
    .flight-card {
      background: var(--cream-light);
      border: 1.5px solid var(--cream-dim);
      border-left: 3.5px solid var(--gold);
      border-radius: 10px;
      padding: 12px 14px; margin-top: 9px; font-size: 13px;
    }
    .flight-card .route {
      font-weight: 700; font-size: 13.5px;
      color: var(--navy);
      display: flex; align-items: center; gap: 6px;
    }
    .flight-card .route svg {
      width: 13px; height: 13px;
      fill: var(--orange); flex-shrink: 0;
    }
    .flight-card .details {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11.5px; margin-top: 5px;
    }
    .flight-card .fc-badge {
      display: inline-block;
      padding: 2px 9px; border-radius: 999px;
      font-size: 11px; font-weight: 600;
      margin-top: 7px;
    }
    .fc-green { background: #d1fae5; color: #065f46; }
    .fc-amber { background: #fef3c7; color: #92400e; }
    .fc-red   { background: #fee2e2; color: #991b1b; }

    /* ── Typing indicator ─────────────────────────── */
    .typing {
      display: flex; gap: 5px;
      padding: 13px 16px;
      background: var(--bubble-bot);
      border: 1.5px solid var(--border-light);
      border-radius: var(--radius); border-top-left-radius: 4px;
      width: 64px;
    }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--cream-dim);
      animation: typebounce .9s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: .16s; }
    .typing span:nth-child(3) { animation-delay: .32s; }
    @keyframes typebounce {
      0%, 80%, 100% { transform: scale(.65); opacity: .45; }
      40%           { transform: scale(1.1); opacity: 1; }
    }

    /* ════════════════════════════════════════════════
       WELCOME SCREEN
    ════════════════════════════════════════════════ */
    .welcome {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex: 1; gap: 14px;
      padding: 48px 24px; text-align: center;
    }
    .welcome-logo {
      width: 72px; height: 72px;
      background: linear-gradient(145deg, var(--navy-deep), var(--navy));
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-md), 0 0 0 6px rgba(0,48,73,.07);
    }
    .welcome-logo svg { width: 36px; height: 36px; fill: var(--gold); }
    .welcome h2 {
      font-size: 20px; font-weight: 700;
      color: var(--navy); letter-spacing: -.3px;
    }
    .welcome-rule {
      width: 48px; height: 2.5px;
      background: linear-gradient(90deg, var(--red), var(--gold));
      border-radius: 2px;
    }
    .welcome p {
      font-size: 13.5px; color: var(--muted);
      max-width: 360px; line-height: 1.7;
    }
    /* 3 feature chips below welcome text */
    .welcome-chips {
      display: flex; gap: 8px; flex-wrap: wrap;
      justify-content: center; margin-top: 4px;
    }
    .chip {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      font-size: 11.5px; font-weight: 500;
      color: var(--muted);
      background: var(--surface);
    }
    .chip svg {
      width: 13px; height: 13px;
      stroke: var(--orange); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ════════════════════════════════════════════════
       INPUT AREA
    ════════════════════════════════════════════════ */
    .input-area {
      padding: 13px 20px 15px;
      background: var(--surface);
      border-top: 1.5px solid var(--border-light);
      flex-shrink: 0;
    }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }

    #user-input {
      flex: 1;
      padding: 11px 16px;
      border: 1.5px solid var(--border);
      border-radius: 11px;
      font-family: var(--font-ui);
      font-size: 14px; color: var(--text);
      background: var(--cream-light);
      resize: none;
      height: 44px; min-height: 44px; max-height: 120px;
      line-height: 1.5;
      outline: none; overflow-y: hidden;
      transition: border-color .18s, box-shadow .18s, background .18s;
      display: block;
    }
    #user-input:focus {
      border-color: var(--navy);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(0,48,73,.09);
    }
    #user-input::placeholder { color: #b0a07a; }

    #send-btn {
      width: 44px; height: 44px;
      background: var(--red);
      border: none; border-radius: 11px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(214,40,40,.35);
      transition: background .18s, transform .12s, box-shadow .18s;
    }
    #send-btn:hover  { background: var(--red-dark); box-shadow: 0 4px 16px rgba(214,40,40,.45); }
    #send-btn:active { transform: scale(.92); }
    #send-btn svg    { fill: #fff; width: 18px; height: 18px; }
    #send-btn:disabled {
      background: var(--border); box-shadow: none; cursor: not-allowed;
    }

    .input-hint {
      font-size: 11px; color: var(--muted);
      margin-top: 7px; font-family: var(--font-mono); opacity: .6;
    }

    /* ── Toast ────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(18px);
      background: var(--navy-deep); color: #fff;
      padding: 10px 20px; border-radius: 9px;
      font-size: 13px; opacity: 0; pointer-events: none;
      transition: all .25s ease; z-index: 999;
      border-left: 3px solid var(--gold);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 600px) {
      .app    { max-width: 100%; box-shadow: none; }
      .bubble { max-width: 87%; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ════════════ HEADER ════════════ -->
  <header>
    <div class="header-logo">
      <!-- Plane icon, gold fill -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>AeroDesk Support</h1>
      <p>Intelligent Airline Assistant</p>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      Online
    </div>
  </header>

  <!-- ════════════ QUICK BAR ════════════ -->
  <div class="quick-bar">

    <!-- Search flights — magnifying glass -->
    <button class="quick-btn" onclick="quickAction('Search flights from New York to London')">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search Flights
    </button>

    <!-- My Booking — bookmark -->
    <button class="quick-btn" onclick="quickAction('Check my booking ABC123')">
      <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      My Booking
    </button>

    <!-- Cancel — x circle -->
    <button class="quick-btn" onclick="quickAction('Cancel booking DEF456')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      Cancel
    </button>

    <!-- Change Seat — grid/seat icon -->
    <button class="quick-btn" onclick="quickAction('Change seat to 14B for ABC123')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Change Seat
    </button>

    <!-- Raise Ticket — tag icon -->
    <button class="quick-btn" onclick="quickAction('I have an issue with my meal for booking ABC123')">
      <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      Raise Ticket
    </button>

    <!-- Help — question mark circle (filled) -->
    <button class="quick-btn btn-help" onclick="quickAction('help')">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/>
      </svg>
      Help
    </button>

  </div>

  <!-- ════════════ MESSAGES ════════════ -->
  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/>
        </svg>
      </div>
      <h2>Welcome to AeroDesk</h2>
      <div class="welcome-rule"></div>
      <p>Search flights, manage your booking, change seats, or raise a support ticket — I've got you covered.</p>
      <div class="welcome-chips">
        <span class="chip">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Flight Search
        </span>
        <span class="chip">
          <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          Bookings
        </span>
        <span class="chip">
          <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          Support Tickets
        </span>
      </div>
    </div>
  </div>

  <!-- ════════════ INPUT ════════════ -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="user-input"
        placeholder="Type your message"
        autocomplete="off"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">↵ Enter to send &nbsp;·&nbsp; Shift+↵ for new line</div>
  </div>

</div><!-- /.app -->

<div id="toast"></div>

<script>
  /* ── Config ──────────────────────────────────────── */
  const API_BASE = 'http://localhost:5000/api';
  let isWaiting  = false;

  /* ── DOM refs ────────────────────────────────────── */
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const toastEl    = document.getElementById('toast');
  let   welcomeEl  = document.getElementById('welcome');

  /* ── Avatar SVG strings ──────────────────────────── */
  const SVG_PLANE = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/>
  </svg>`;

  const SVG_PERSON = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
  </svg>`;

  /* ── Textarea auto-resize ────────────────────────── */
  inputEl.addEventListener('input', () => {
    inputEl.style.height = '44px';
    const newH = Math.min(inputEl.scrollHeight, 120);
    inputEl.style.height = newH + 'px';
    inputEl.style.overflowY = newH >= 120 ? 'auto' : 'hidden';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  /* ── Quick actions ───────────────────────────────── */
  function quickAction(text) {
    inputEl.value = text;
    inputEl.dispatchEvent(new Event('input'));
    sendMessage();
  }

  /* ── Toast ───────────────────────────────────────── */
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 3200);
  }

  /* ── Helpers ─────────────────────────────────────── */
  function nowTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function intentClass(intent) {
    return { search_flights:'search', get_booking:'booking', cancel_booking:'cancel',
             change_seat:'seat', create_ticket:'ticket', help:'help', unknown:'unknown' }[intent] || 'help';
  }

  function intentLabel(intent) {
    return { search_flights:'Search', get_booking:'Booking', cancel_booking:'Cancel',
             change_seat:'Seat', create_ticket:'Ticket', help:'Help', unknown:'Unknown' }[intent] || intent;
  }

  function renderText(text) {
    return text
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  /* ── Flight cards ────────────────────────────────── */
  function renderFlightCards(data) {
    if (!data?.flights) return '';
    return data.flights.map(f => {
      const avail = parseInt(f.available_seats);
      let cls = 'fc-green', label = `${avail} seats`;
      if (avail === 0)     { cls = 'fc-red';   label = 'Full'; }
      else if (avail < 15) { cls = 'fc-amber'; label = `${avail} left`; }

      // Inline plane icon inside the route line
      const planeIcon = `<svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/></svg>`;

      return `
        <div class="flight-card">
          <div class="route">${planeIcon} ${f.flight_number} &nbsp;·&nbsp; ${f.origin} → ${f.destination}</div>
          <div class="details">Departs ${f.departure_time} &nbsp;|&nbsp; $${parseFloat(f.price).toFixed(2)}</div>
          <span class="fc-badge ${cls}">${label}</span>
        </div>`;
    }).join('');
  }

  /* ── Append message ──────────────────────────────── */
  function appendMessage(role, text, intent, data) {
    if (welcomeEl) { welcomeEl.remove(); welcomeEl = null; }

    const row         = document.createElement('div');
    row.className     = `msg-row ${role}`;
    const avatarSVG   = role === 'user' ? SVG_PERSON : SVG_PLANE;
    const avatarClass = role === 'user' ? 'user' : 'bot';

    let inner = '';
    if (role === 'bot' && intent) {
      inner += `<div class="intent-badge ${intentClass(intent)}">${intentLabel(intent)}</div>`;
    }
    inner += `<div class="bubble-body">${renderText(text)}</div>`;
    if (role === 'bot' && data) inner += renderFlightCards(data);

    row.innerHTML = `
      <div class="avatar ${avatarClass}">${avatarSVG}</div>
      <div>
        <div class="bubble">${inner}</div>
        <div class="bubble-meta">${nowTime()}</div>
      </div>`;

    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  /* ── Typing indicator ────────────────────────────── */
  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot'; row.id = 'typing-row';
    row.innerHTML = `<div class="avatar bot">${SVG_PLANE}</div>
      <div><div class="typing"><span></span><span></span><span></span></div></div>`;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function hideTyping() {
    document.getElementById('typing-row')?.remove();
  }

  /* ── Send ────────────────────────────────────────── */
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isWaiting) return;

    inputEl.value = '';
    inputEl.style.height = '44px';
    inputEl.style.overflowY = 'hidden';

    appendMessage('user', text);
    isWaiting = true; sendBtn.disabled = true; showTyping();

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      const json = await res.json();
      hideTyping();
      appendMessage('bot', json.response, json.intent, json.data);

    } catch (err) {
      hideTyping();
      appendMessage('bot',
        err.message.includes('Failed to fetch')
          ? '⚠️ Cannot reach the server. Make sure api.py is running on port 5000.'
          : `❌ Error: ${err.message}`,
        'unknown', null);
      showToast('Connection error');
    } finally {
      isWaiting = false; sendBtn.disabled = false; inputEl.focus();
    }
  }

  inputEl.focus();
</script>
</body>
</html>
